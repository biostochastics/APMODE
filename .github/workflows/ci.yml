# SPDX-License-Identifier: GPL-2.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --all-extras
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/apmode/ --strict

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --all-extras --python ${{ matrix.python-version }}
      - run: uv run pytest tests/ -v --tb=short -n auto

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --all-extras
      - name: Suite A scenario validation
        run: uv run pytest tests/unit/test_benchmark_suite_a.py -v --tb=short
      - name: Suite A structure recovery assertions
        run: uv run pytest tests/unit/test_benchmark_simulation.py -v --tb=short

  policy-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --all-extras
      - run: uv run python -m apmode.governance.validate_policies policies/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv sync --all-extras
      - name: Bandit static security analysis
        run: uv run bandit -r src/apmode/ -ll
      - name: pip-audit dependency CVE scan
        run: uv run pip-audit

  r-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("jsonlite", "lotri"), repos="https://cloud.r-project.org")'
          Rscript -e 'install.packages("rxode2", repos="https://cloud.r-project.org")'
      - run: uv sync --all-extras
      - name: Suite A R simulation
        run: Rscript benchmarks/suite_a/simulate_all.R /tmp/suite_a_output
      - name: Integration tests (R-dependent)
        run: uv run pytest tests/integration/ -v --tb=short
