# SPDX-License-Identifier: GPL-2.0-or-later
name: Suite C Phase-1 (weekly)

# Plan Task 41 — weekly Suite C scoring sweep against the Phase-1 MLE
# literature fixtures.
#
# Scope contract:
# * **Not** a release-block. A miss opens a GitHub issue; the release
#   gate is owned by the per-PR ``CI`` workflow.
# * Reads ``benchmarks/suite_c/phase1_npe_inputs.json`` (a hand-curated
#   file of {fixture_id: {npe_apmode, npe_literature}} entries). Plan
#   Task 44 will replace this with a live orchestrator-driven loop;
#   until then, the workflow scores whatever the inputs file contains
#   and surfaces the result so the gate is *measurable* even before the
#   live loop lands.
# * Skips silently (job succeeds with a warning annotation) when the
#   inputs file is absent — keeps the weekly cadence green during the
#   bootstrap window without papering over real misses later.
#
# Security note (per workflow-injection guidance): no `run:` block
# interpolates untrusted GitHub event payload (no `${{ github.event.X }}`
# inside shell commands). The only GitHub expressions live in `if:`
# conditions and on dispatch-input defaults, both of which are
# expression-context-safe.

on:
  schedule:
    # Weekly Monday 03:17 UTC — off the hour to avoid the GitHub
    # Actions runner-pool spike at top-of-hour cron alignments.
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      open_issue_on_failure:
        description: "Open a GitHub issue if the gate misses"
        required: false
        default: "true"

permissions:
  contents: read
  issues: write  # required for the `gh issue create` fallback below

jobs:
  score:
    name: Score Phase-1 fixtures
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Sync deps (no R / cmdstan needed for the scoring math)
        run: uv sync --extra dev

      - name: Check for inputs file
        id: inputs
        run: |
          if [ -f benchmarks/suite_c/phase1_npe_inputs.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::benchmarks/suite_c/phase1_npe_inputs.json not present — scoring skipped (plan Task 44 owns the live-fit loop)"
          fi

      - name: Score Phase-1 fixtures
        if: steps.inputs.outputs.exists == 'true'
        id: score
        run: |
          uv run python -m apmode.benchmarks.suite_c_phase1_cli \
            --inputs benchmarks/suite_c/phase1_npe_inputs.json \
            --out scorecard.json \
            --markdown-summary scorecard.md
          echo "passes=$(jq -r '.passes_gate' scorecard.json)" >> "$GITHUB_OUTPUT"

      - name: Upload scorecard artifact
        if: steps.inputs.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: suite-c-phase1-scorecard
          path: |
            scorecard.json
            scorecard.md
          retention-days: 30

      - name: Append summary to GitHub Actions UI
        if: steps.inputs.outputs.exists == 'true'
        run: cat scorecard.md >> "$GITHUB_STEP_SUMMARY"

      - name: Check for existing open gate-miss issue (week-scoped)
        # Dedups within the same UTC week so a manual workflow_dispatch
        # re-run on the same Monday does not stack issues. Across weeks,
        # the title carries the date and a fresh issue is opened so the
        # regression history remains visible if last week's issue is
        # still being triaged.
        if: |
          steps.inputs.outputs.exists == 'true' &&
          steps.score.outputs.passes == 'false' &&
          (github.event.inputs.open_issue_on_failure == 'true' || github.event_name == 'schedule')
        id: check-existing-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISO_DATE="$(date -u +%Y-%m-%d)"
          SEARCH_TITLE="Suite C Phase-1 gate missed (week of ${ISO_DATE})"
          if gh issue list --state open --label "suite-c" --label "phase-1-regression" --json title --jq '.[].title' | grep -Fxq "$SEARCH_TITLE"; then
            echo "duplicate=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Duplicate gate-miss issue already open for week ${ISO_DATE} — skipping issue creation"
          else
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open GitHub issue on missed gate
        if: |
          steps.inputs.outputs.exists == 'true' &&
          steps.score.outputs.passes == 'false' &&
          steps.check-existing-issue.outputs.duplicate == 'false' &&
          (github.event.inputs.open_issue_on_failure == 'true' || github.event_name == 'schedule')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISO_DATE="$(date -u +%Y-%m-%d)"
          ISSUE_TITLE="Suite C Phase-1 gate missed (week of ${ISO_DATE})"
          {
            cat scorecard.md
            printf '\n\n---\n\n*Auto-generated by `.github/workflows/suite_c_phase1.yml` — plan Task 41. Methodology-drift signal, not a release block. Triage the per-fixture diff above; if a single dataset regressed, open a follow-up PR rather than rolling back the whole release.*\n'
          } > issue_body.md
          gh issue create \
            --title "$ISSUE_TITLE" \
            --body-file issue_body.md \
            --label "suite-c,phase-1-regression"
