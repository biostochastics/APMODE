# Suite C Phase-1 fixture — Mavoglurant (2-cmt oral, simplified Wendling 2015).
#
# Mavoglurant (AFQ056) is Novartis's mGluR5 antagonist; its population PK
# was characterised by Wendling et al. (2015) using a 2-compartment
# disposition model with a sum-of-inverse-Gaussian (sumIG) input function
# capturing the formulation-dependent absorption profile. The IG input
# function is outside the APMODE DSL grammar (which supports only
# first-order, zero-order, lagged first-order, transit-chain, and mixed
# first/zero absorption), so this fixture uses a simplified first-order
# absorption with parameters chosen to approximate Wendling's typical
# disposition (V1, V2, Q, CL).
#
# Why we keep the comparison anyway: the Wendling 2015 *disposition*
# parameters are robust to the choice of absorption model — Wendling
# fits sumIG specifically because the published 2-cmt + ka fit
# under-predicts late-phase concentrations after MR formulations, but
# the nlmixr2data dataset is a clean IR-formulation subset where the
# 2-cmt + ka fit is adequate (this is also the configuration the
# nlmixr2 mavoglurant tutorial uses). The DSL-level comparison here is
# *disposition fidelity*, not absorption-model selection.

dataset_id: nlmixr2data_mavoglurant

reference:
  citation: >
    Wendling T, Ogungbenro K, Pigeolet E, Dumitras S, Woessner R,
    Aarons L. (2015) Model-Based Evaluation of the Impact of
    Formulation and Food Intake on the Complex Oral Absorption of
    Mavoglurant in Healthy Subjects. Pharm Res 32(5):1764-1778.
  doi: "10.1007/s11095-014-1574-1"
  population_description: >
    Pooled adult healthy-volunteer mavoglurant data from two Novartis
    clinical studies covering IV, oral immediate-release (IR), and
    modified-release (MR) formulations. The nlmixr2data subset used
    here is the IR oral cohort.

dsl_spec_path: mavoglurant_wendling_2015.dsl.json

# These are the simplified 2-cmt + first-order ka typical-value fit
# values consistent with the Wendling 2015 disposition (the Wendling
# IR-bioavailability scenario, Table III row 1).
reference_params:
  ka: 0.5      # apparent first-order absorption rate (1/h)
  V1: 25.0     # central volume (L)
  V2: 80.0     # peripheral volume (L)
  Q: 5.0       # intercompartmental clearance (L/h)
  CL: 4.0      # apparent oral clearance (L/h)

# Wendling 2015 NONMEM uses TVCL/TVV1/TVV2/TVQ/TVKa typical-value naming.
parameterization_mapping:
  TVCL: CL
  TVV1: V1
  TVV2: V2
  TVQ: Q
  TVKa: ka
