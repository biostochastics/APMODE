# Pre-commit hooks for APMODE
# Install: uv run pre-commit install
# Run all: uv run pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff-format
        name: ruff format
      - id: ruff
        name: ruff check
        args: [--fix]

  # Use local mypy (from uv venv) so it has all project dependencies
  - repo: local
    hooks:
      - id: mypy
        name: mypy strict
        entry: uv run mypy src/apmode/ --strict
        language: system
        types: [python]
        files: ^src/apmode/
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
